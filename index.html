<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoftLisan — Software for an accessible world</title>
  <meta name="description" content="SoftLisan builds accessible design tools and software. Explore our products." />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b1a; color: #f0f0f5; line-height: 1.6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    h1 {
      font-size: 36px; font-weight: 800; margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: #b0b0c8; margin-bottom: 32px; max-width: 500px; }
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid #2a2a4a;
      border-radius: 12px; padding: 32px; max-width: 400px; width: 100%;
    }
    .card h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .card p { font-size: 14px; color: #b0b0c8; margin-bottom: 20px; }
    .btn {
      display: inline-block; padding: 12px 24px; border-radius: 8px;
      font-size: 15px; font-weight: 600; text-decoration: none;
      background: #7c5cfc; color: #fff; transition: background 0.2s;
    }
    .btn:hover { background: #6a4de6; }
    *:focus-visible { outline: 3px solid #7c5cfc; outline-offset: 2px; }
    footer { margin-top: 40px; color: #5555aa; font-size: 13px; }
  </style>
</head>
<body>
  <h1>SoftLisan</h1>
  <p>Building accessible software for everyone.</p>
  <div class="card">
    <h2>DesignAlly</h2>
    <p>WCAG-compliant color palettes for Figma. Generate light and dark themes from one brand color.</p>
    <a class="btn" href="/design/">Learn More</a>
  </div>
  <footer>&copy; 2026 SoftLisan</footer>
</body>
</html>
